name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Allow the gym repo to trigger a rebuild when its API changes:
  #   gh api repos/ManhattanReasoning/manhattanreasoning-docs/dispatches \
  #     -f event_type=code-updated
  repository_dispatch:
    types: [code-updated]

permissions:
  contents: write   # required to push the built site to gh-pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs
        uses: actions/checkout@v4

      # mkdocstrings reads the Python API reference from the public gym repo.
      # It's public, so this is a plain checkout -- no deploy key needed.
      - name: Checkout manhattan-reasoning-gym source
        uses: actions/checkout@v4
        with:
          repository: ManhattanReasoning/manhattan-reasoning-gym
          path: _code

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: pip install -r docs-requirements.txt

      - name: Build site
        run: mkdocs build --strict

      - name: Deploy to gh-pages
        if: github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./site
          cname: docs.manhattanreasoning.com
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "deploy: ${{ github.sha }}"
