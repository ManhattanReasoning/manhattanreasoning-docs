{#-
  Search overlay. The built-in `search` plugin auto-loads search/main.js, which
  binds to #mkdocs-search-query and renders into #mkdocs-search-results.
  Opened via [data-search-open] (see js/docs.js).
-#}
<div class="search-overlay" id="search-overlay" hidden>
  <div class="search-modal" role="dialog" aria-modal="true" aria-label="Search">
    <div class="search-modal__field">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input type="search" id="mkdocs-search-query" placeholder="Search the docs&hellip;"
             autocomplete="off" spellcheck="false" aria-label="Search">
      <button type="button" class="search-modal__close" data-search-close aria-label="Close">Esc</button>
    </div>
    <div class="search-modal__results" id="mkdocs-search-results" data-no-results-text="No results found"></div>
  </div>
</div>
