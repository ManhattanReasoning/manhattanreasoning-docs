site_name: Docs
site_description: >-
  Program real FPGAs from Python. The manhattan-reasoning-gym SDK and CLI:
  quickstart, SDK usage, CLI usage, examples, and API reference.
site_url: https://docs.manhattanreasoning.com/
copyright: © Manhattan Reasoning

docs_dir: docs
site_dir: site

# Custom theme (see theme/). We dropped mkdocs-material for full design
# control while keeping MkDocs' search plugin + mkdocstrings. Favicon, logo,
# fonts, and colours all live in theme/css/docs.css and the templates.
theme:
  name: null
  custom_dir: theme

extra_javascript:
  # The home hero's [data-routing-field] canvas (docs/index.md) is animated by
  # the same routing visualiser as manhattanreasoning.com, so arriving here
  # reads as a dark-mode version of the main site. Harmless on pages with no
  # such canvas.
  - javascripts/routing-viz.js
  # Renders ```mermaid fences (see the superfences custom_fences entry below)
  # with themeVariables matched to docs.css's palette. Harmless on pages with
  # no .mermaid blocks.
  - path: javascripts/mermaid-init.js
    type: module

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          # Static analysis of the source -- no need to install the package or
          # its deps. The public manhattan-reasoning-gym repo is checked out
          # into _code/ (CI) or cloned there locally via scripts/fetch-code.sh.
          # Public repo, so no deploy key needed anywhere.
          paths: [_code/src]
          options:
            docstring_style: google
            show_root_heading: true
            show_source: true
            show_signature_annotations: true
            separate_signature: true
            members_order: source
            filters: ["!^_"]

nav:
  - Home: index.md
  - Guide:
      - Quickstart: guides/quickstart.md
      - SDK Usage: guides/sdk.md
      - CLI Usage: guides/cli.md
  - Examples:
      - Overview: examples/index.md
      - Hello Wishbone: examples/hello-wishbone.md
      - SAT solver: examples/sat-solver.md
      - BERT feed-forward: examples/bert-ffn.md
      - FFN accelerator: examples/ffn-accel.md
  - Reference:
      - Overview: reference/index.md
      - Hardware & SoC: reference/hardware.md
      - mrg.cloud: reference/cloud.md
      - mrg.build: reference/build.md
      - mrg.sandbox: reference/sandbox.md
      - mrg.bench: reference/bench.md
  - Changelog: changelog.md
